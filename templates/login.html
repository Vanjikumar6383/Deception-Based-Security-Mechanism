<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaMart | Secure Account Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #8b5cf6;
            --danger: #ef4444;
            --border: #334155;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; position: relative;}
        
        .login-wrapper {
            background: var(--surface); width: 100%; max-width: 440px; padding: 40px; border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid var(--border); z-index: 10;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 800; color: #fff; text-decoration: none; margin-bottom: 8px; display: inline-block;}
        .logo span { color: var(--primary); }
        .subtitle { color: var(--text-dim); font-size: 0.95rem; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 500; font-size: 0.9rem; color: #e2e8f0; margin-bottom: 8px; }
        .input-group input {
            width: 100%; background: #0f172a; border: 1px solid var(--border); padding: 14px 16px;
            border-radius: 8px; color: #fff; font-family: 'Inter', sans-serif; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2); }
        
        .btn-submit {
            width: 100%; background: var(--primary); border: none; color: #fff; padding: 16px;
            border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { background: #7c3aed; }

        .alert { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--danger); padding: 12px 16px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 20px; display: flex; gap: 10px; align-items:center; }

        .footer-text { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-dim); }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .footer-text a:hover { text-decoration: underline; }
        
        /* Subtle background styling */
        .decor { position: absolute; border-radius: 50%; opacity: 0.5; filter: blur(80px); }
        .d1 { top: 10%; right: 20%; width: 300px; height: 300px; background: rgba(139, 92, 246, 0.3); }
        .d2 { bottom: 10%; left: 20%; width: 400px; height: 400px; background: rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body>
    <div class="decor d1"></div>
    <div class="decor d2"></div>

    <div class="login-wrapper">
        <div class="header">
            <a href="/" class="logo">Nova<span>Mart</span></a>
            <div class="subtitle">Log in to view orders & account details</div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="input-group">
                <label>Email Address / Username</label>
                <input type="text" name="username" placeholder="customer@example.com" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Sign In Securely</button>
        </form>

        <div class="footer-text">
            Don't have an account? <a href="#">Create one</a>
        </div>
    </div>
</body>
</html>
