<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 Forbidden - ACCESS DENIED</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080a0f;
            --brand: #e63946;
            --brand-glow: rgba(230,57,70,0.3);
            --text-main: #ffffff;
            --text-muted: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow and Grid Background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
                linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            opacity: 0.5;
        }
        
        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--brand-glow) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: pulse-glow 3s infinite alternate ease-in-out;
        }

        @keyframes pulse-glow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.7;}
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1;}
        }

        /* Glassmorphic Alert Box */
        .alert-box {
            position: relative;
            z-index: 10;
            background: rgba(15, 17, 23, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(230, 57, 70, 0.4);
            border-radius: 24px;
            padding: 4rem 3rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255,255,255,0.05);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: rgba(230, 57, 70, 0.15);
            border: 2px solid var(--brand);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px var(--brand-glow);
            animation: warningPulse 1.5s infinite;
        }

        @keyframes warningPulse {
            0% { box-shadow: 0 0 0 0 rgba(230,57,70, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(230,57,70, 0); }
            100% { box-shadow: 0 0 0 0 rgba(230,57,70, 0); }
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            color: var(--brand);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--brand);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 15px rgba(230,57,70,0.5);
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        .message {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-terminal {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #666;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .status-terminal span.highlight {
            color: var(--brand);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <div class="alert-box">
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>

        <h1>401 Forbidden</h1>
        <h2>ACCESS_DENIED</h2>
        
        <div class="message">
            <span style="color:var(--brand);">></span> CRITICAL SECURITY INCIDENT<br>
            This endpoint is restricted. Unauthorized reconnaissance detected.<br>
            Your session has been flagged for forensic analysis.
        </div>

        <div class="status-terminal">
            <div>TARGET: <span style="color:#fff;">QUANTUM_CORE_SYS</span></div>
            <div>STATUS: <span class="highlight">SECURE_LOCKDOWN</span></div>
        </div>
    </div>
</body>
</html>
